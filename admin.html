<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 原子の学习之路</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --dark: #0a0a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--dark); color: white; padding: 2rem; min-height: 100vh; }
        .admin-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 2rem; text-align: center; }
        .card { max-width: 900px; margin: 0 auto; padding: 1.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; margin-bottom: 1.5rem; }
        .input, select, textarea { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.5rem; color: white; font-size: 1rem; font-family: inherit; }
        textarea { min-height: 150px; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; font-weight: 700; transition: all 0.3s; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        .btn-primary { background: var(--primary); color: var(--dark); }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(0,255,136,0.5); }
        .btn-danger { background: #ff4444; color: white; }
        .btn-danger:hover { background: #ff6666; }
        .btn-sync { background: linear-gradient(135deg, #ff00ff, #00ff88); color: white; font-size: 1.1rem; padding: 1rem 2rem; width: 100%; max-width: 300px; }
        .btn-sync:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,255,136,0.5); }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: rgba(255,255,255,0.7); }
        .section { margin-bottom: 3rem; }
        .section-title { font-size: 1.5rem; color: var(--primary); margin-bottom: 1rem; }
        .tag { display: inline-block; padding: 0.3rem 0.8rem; background: rgba(0,255,136,0.2); border: 1px solid var(--primary); border-radius: 0.3rem; color: var(--primary); margin: 0.2rem; font-size: 0.9rem; }
        .category-item, .article-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .category-item:last-child, .article-item:last-child { border-bottom: none; }
        .category-name { font-weight: bold; color: var(--primary); }
        .article-title { color: white; font-weight: bold; }
        .article-date { color: rgba(255,255,255,0.5); font-size: 0.8rem; }
        .empty { text-align: center; color: rgba(255,255,255,0.5); padding: 2rem; }
        .tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { padding: 1rem 2rem; cursor: pointer; color: rgba(255,255,255,0.5); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .sync-section { background: rgba(0,255,136,0.1); border: 1px solid var(--primary); padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center; }
        .sync-section h3 { color: var(--primary); margin-bottom: 1rem; }
        .sync-section p { color: rgba(255,255,255,0.7); margin-bottom: 0.5rem; font-size: 0.9rem; }
        .sync-instructions { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; text-align: left; font-size: 0.9rem; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <h1 class="admin-title">📝 文章管理中心</h1>
    
    <!-- 同步区域 -->
    <div class="card">
        <div class="sync-section">
            <h3>🚀 一键同步到GitHub</h3>
            <p>添加/修改文章后，点击下方按钮自动上传！</p>
            <p style="color:var(--primary)">数据会同步到前台和手机端！</p>
            <button class="btn btn-sync" onclick="syncToGitHub()">🔄 一键同步</button>
            <div class="sync-instructions" id="sync-instructions">
                <strong>⚠️ 同步步骤：</strong><br>
                1. 点击上方"一键同步"按钮<br>
                2. 浏览器会下载 data.json 文件<br>
                3. <strong>把下载的文件拖到</strong> D:\custom-blog\ 文件夹覆盖原文件<br>
                4. 双击运行 D:\custom-blog\sync.bat<br>
                5. 完成！刷新博客看看！
            </div>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('articles')">📝 文章管理</div>
        <div class="tab" onclick="switchTab('categories')">🏷️ 分区管理</div>
    </div>
    
    <div class="tab-content active" id="articles-tab">
        <div class="card section">
            <h2 class="section-title">✏️ 发布新文章</h2>
            <div class="form-group">
                <label>选择分区（可选）</label>
                <select id="article-category"><option value="">不选择分区</option></select>
            </div>
            <div class="form-group">
                <label>文章标题</label>
                <input type="text" class="input" id="title" placeholder="输入文章标题...">
            </div>
            <div class="form-group">
                <label>文章内容</label>
                <textarea id="content" placeholder="输入文章内容...支持换行"></textarea>
            </div>
            <button class="btn btn-primary" onclick="addArticle()">✅ 发布文章</button>
        </div>
        
        <div class="card section">
            <h2 class="section-title">📋 我的文章</h2>
            <div id="article-list"></div>
        </div>
    </div>
    
    <div class="tab-content" id="categories-tab">
        <div class="card section">
            <h2 class="section-title">➕ 添加新分区</h2>
            <div class="form-group">
                <label>分区名称</label>
                <input type="text" class="input" id="new-category" placeholder="例如：Unity, Linux, 算法等...">
            </div>
            <button class="btn btn-primary" onclick="addCategory()">➕ 添加分区</button>
        </div>
        
        <div class="card section">
            <h2 class="section-title">🏷️ 我的分区</h2>
            <div id="category-list"></div>
        </div>
    </div>

    <script>
        let blogData = { categories: ['默认'], articles: [] };
        
        function loadFromStorage() {
            const cats = localStorage.getItem('my_categories');
            const arts = localStorage.getItem('my_articles');
            if (cats) blogData.categories = JSON.parse(cats);
            if (arts) blogData.articles = JSON.parse(arts);
            if (blogData.categories.length === 0) blogData.categories = ['默认'];
        }
        
        function getToday() { 
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }
        
        // 一键同步 - 下载JSON然后提示用户
        function syncToGitHub() {
            const json = JSON.stringify(blogData, null, 2);
            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            a.click();
            URL.revokeObjectURL(url);
            
            alert('📥 data.json 已下载！\n\n请把文件拖到 D:\\custom-blog 文件夹覆盖原文件\n然后双击 sync.bat 上传！');
        }
        
        // 分区管理
        function getCategories() { return blogData.categories; }
        function saveCategories(cats) { blogData.categories = cats; localStorage.setItem('my_categories', JSON.stringify(cats)); renderCategories(); updateCategorySelect(); }
        
        function addCategory() {
            const name = document.getElementById('new-category').value.trim();
            if (!name) { alert('请输入分区名称！'); return; }
            const cats = getCategories();
            if (cats.includes(name)) { alert('分区已存在！'); return; }
            cats.push(name);
            saveCategories(cats);
            document.getElementById('new-category').value = '';
        }
        
        function deleteCategory(name) {
            if (!confirm('确定要删除分区 "' + name + '" 吗？')) return;
            const cats = getCategories().filter(c => c !== name);
            saveCategories(cats);
        }
        
        function renderCategories() {
            const cats = getCategories();
            const list = document.getElementById('category-list');
            if (cats.length === 0) { list.innerHTML = '<div class="empty">暂无分区</div>'; return; }
            list.innerHTML = cats.map(c => `
                <div class="category-item">
                    <span class="category-name">🏷️ ${c}</span>
                    ${c !== '默认' ? '<button class="btn btn-danger" onclick="deleteCategory(\''+c+'\')">🗑️ 删除</button>' : '<span style="color:rgba(255,255,255,0.3)">系统保留</span>'}
                </div>
            `).join('');
        }
        
        function updateCategorySelect() {
            const cats = getCategories();
            const select = document.getElementById('article-category');
            select.innerHTML = '<option value="">不选择分区</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        
        // 文章管理
        function getArticles() { return blogData.articles; }
        function saveArticles(articles) { blogData.articles = articles; localStorage.setItem('my_articles', JSON.stringify(articles)); renderArticles(); }
        
        function addArticle() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const category = document.getElementById('article-category').value || '默认';
            if (!title || !content) { alert('请填写标题和内容！'); return; }
            const excerpt = content.length > 50 ? content.substring(0, 50) + '...' : content;
            const articles = getArticles();
            const newId = articles.length > 0 ? Math.max(...articles.map(a => a.id)) + 1 : 1;
            articles.unshift({ id: newId, title, date: getToday(), category, excerpt, content });
            saveArticles(articles);
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            alert('✅ 文章发布成功！记得点击"一键同步"哦！');
        }
        
        function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？')) return;
            const articles = getArticles().filter(a => a.id !== id);
            saveArticles(articles);
        }
        
        function renderArticles() {
            const articles = getArticles();
            const list = document.getElementById('article-list');
            if (articles.length === 0) { list.innerHTML = '<div class="empty">暂无文章</div>'; return; }
            list.innerHTML = articles.map(a => `
                <div class="article-item">
                    <div><span class="tag">${a.category}</span><span class="article-title">${a.title}</span><span class="article-date">${a.date}</span></div>
                    <button class="btn btn-danger" onclick="deleteArticle(${a.id})">🗑️</button>
                </div>
            `).join('');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab')[tab === 'articles' ? 0 : 1].classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        loadFromStorage();
        renderCategories();
        updateCategorySelect();
        renderArticles();
    </script>
</body>
</html>
