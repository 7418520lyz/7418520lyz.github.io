<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 原子の学习之路</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --dark: #0a0a0f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark);
            color: white;
            padding: 2rem;
            min-height: 100vh;
        }
        .admin-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 2rem;
            text-align: center;
        }
        .card {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        .input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }
        .input:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            min-height: 200px;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: var(--dark);
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        .btn-danger {
            background: #ff4444;
            color: white;
            margin-left: 1rem;
        }
        .btn-danger:hover {
            background: #ff6666;
        }
        .article-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .article-item:last-child {
            border-bottom: none;
        }
        .article-info h3 {
            color: white;
            margin-bottom: 0.5rem;
        }
        .article-info p {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.7);
        }
        .section {
            margin-bottom: 3rem;
        }
        .section-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .download-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            color: white;
            text-decoration: none;
            margin-right: 1rem;
            font-size: 0.9rem;
        }
        .download-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <h1 class="admin-title">📝 文章管理中心</h1>
    
    <!-- 添加文章 -->
    <div class="card section">
        <h2 class="section-title">✏️ 添加新文章</h2>
        <div class="form-group">
            <label>文章标题</label>
            <input type="text" class="input" id="title" placeholder="输入文章标题...">
        </div>
        <div class="form-group">
            <label>文章内容</label>
            <textarea id="content" placeholder="输入文章内容...支持换行"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addArticle()">✅ 发布文章</button>
    </div>
    
    <!-- 文章列表 -->
    <div class="card section">
        <h2 class="section-title">📋 我的文章</h2>
        <div id="article-list"></div>
    </div>
    
    <!-- 导出/导入 -->
    <div class="card section">
        <h2 class="section-title">💾 数据备份</h2>
        <a href="#" class="download-btn" onclick="downloadData()">📥 导出文章数据</a>
        <button class="btn btn-danger" onclick="clearAll()">🗑️ 删除所有文章</button>
    </div>

    <script>
        // 获取今天日期
        function getToday() {
            const now = new Date();
            return now.toISOString().split('T')[0];
        }

        // 从localStorage读取文章
        function getArticles() {
            const stored = localStorage.getItem('my_articles');
            if (stored) {
                return JSON.parse(stored);
            }
            // 默认文章
            return [
                {
                    id: 1,
                    title: "Hello World - 我的第一篇博客",
                    date: "2026-04-11",
                    excerpt: "这是我的第一篇博客！从今天开始我要记录学习网络安全的点点滴滴...",
                    content: "这是我的第一篇博客！\n\n从今天开始，我要记录学习网络安全的点点滴滴。\n\n我是大一学生，专业是网络空间安全。刚学完Linux基础命令，感觉好酷！\n\n加油！💪"
                },
                {
                    id: 2,
                    title: "Linux学习笔记 - 基础命令",
                    date: "2026-04-10",
                    excerpt: "今天学习了Linux的基础命令，包括ls、cd、mkdir等...",
                    content: "今日学习Linux基础命令：\n\n📁 文件操作\n- ls - 列出文件\n- cd - 切换目录\n- mkdir - 创建目录\n\n🔍 搜索\n- find - 查找文件\n- grep - 查找内容\n\n加油！每天进步一点点！🌟"
                }
            ];
        }

        // 保存文章到localStorage
        function saveArticles(articles) {
            localStorage.setItem('my_articles', JSON.stringify(articles));
            renderArticles();
            alert('✅ 文章已保存！\n\n💡 提示：这些数据保存在你的浏览器里。\n如果要永久保存，可以点击"导出文章数据"下载。');
        }

        // 渲染文章列表
        function renderArticles() {
            const articles = getArticles();
            const list = document.getElementById('article-list');
            if (articles.length === 0) {
                list.innerHTML = '<p style="color:rgba(255,255,255,0.5);text-align:center;">暂无文章</p>';
                return;
            }
            list.innerHTML = articles.map(a => `
                <div class="article-item">
                    <div class="article-info">
                        <h3>${a.title}</h3>
                        <p>${a.date}</p>
                    </div>
                    <button class="btn btn-danger" onclick="deleteArticle(${a.id})">🗑️ 删除</button>
                </div>
            `).join('');
        }

        // 添加文章
        function addArticle() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            
            if (!title || !content) {
                alert('请填写标题和内容！');
                return;
            }
            
            // 生成摘要（前50字）
            const excerpt = content.length > 50 ? content.substring(0, 50) + '...' : content;
            
            const articles = getArticles();
            const newId = articles.length > 0 ? Math.max(...articles.map(a => a.id)) + 1 : 1;
            
            articles.unshift({
                id: newId,
                title: title,
                date: getToday(),
                excerpt: excerpt,
                content: content
            });
            
            saveArticles(articles);
            
            // 清空输入
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
        }

        // 删除文章
        function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？')) return;
            
            const articles = getArticles().filter(a => a.id !== id);
            saveArticles(articles);
        }

        // 导出数据
        function downloadData() {
            const articles = getArticles();
            const data = JSON.stringify(articles, null, 2);
            const blob = new Blob(['const articles = ' + data + ';'], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'articles.js';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 删除所有
        function clearAll() {
            if (!confirm('确定要删除所有文章吗？此操作不可恢复！')) return;
            localStorage.removeItem('my_articles');
            renderArticles();
            alert('已清空所有文章！');
        }

        // 初始化
        renderArticles();
    </script>
</body>
</html>
