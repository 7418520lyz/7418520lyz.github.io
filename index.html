<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原子の学习之路 | 7418520lyz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           MINIMAL DARK THEME
           深色系简洁清爽高级感
           ======================================== */

        :root {
            /* 深灰背景层次 */
            --bg-deep: #121218;
            --bg-main: #1a1a22;
            --bg-soft: #242430;

            /* 低饱和度点缀色 - 莫兰迪色系 */
            --accent: #8b9a9b;
            --accent-warm: #c4a77d;
            --accent-cool: #7d8b9a;

            /* 主色调 */
            --primary: #e8e4df;
            --secondary: #8b9a9b;
            --text-primary: #e8e4df;
            --text-secondary: rgba(232, 228, 223, 0.6);
            --text-muted: rgba(232, 228, 223, 0.35);

            /* 极淡边框 */
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);

            /* 微妙阴影 */
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);

            /* 间距 */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 4rem;
            --space-xl: 6rem;

            /* 过渡 */
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --duration-fast: 0.2s;
            --duration-base: 0.3s;
            --duration-slow: 0.5s;
        }

        /* ========================================
           BASE STYLES
           ======================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
            height: 100%;
        }

        body {
            min-height: 100%;
        }

        /* 阅读进度条 */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-warm));
            z-index: 1000;
            transition: width 0.1s linear;
        }

        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.8;
            font-weight: 400;
            letter-spacing: 0.01em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--duration-slow) var(--ease), color var(--duration-slow) var(--ease);
        }

        /* 精致网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(139, 154, 155, 0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(196, 167, 125, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: ambientShift 20s ease-in-out infinite alternate;
        }

        @keyframes ambientShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 5%); }
        }

        /* 精致滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(139, 154, 155, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 154, 155, 0.5);
        }

        /* 文字选择颜色 */
        ::selection {
            background: rgba(139, 154, 155, 0.3);
            color: var(--text-primary);
        }

        /* 高级浮动光球 */
        .floating-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 154, 155, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(196, 167, 125, 0.12) 0%, transparent 70%);
            top: 60%;
            right: 15%;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(125, 139, 154, 0.1) 0%, transparent 70%);
            bottom: 20%;
            left: 30%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* 噪点纹理 */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* 精致光标 */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease, width 0.2s ease, height 0.2s ease, border-color 0.2s ease;
            transform: translate(-50%, -50%);
        }

        .cursor.hover {
            width: 40px;
            height: 40px;
            border-color: var(--accent-warm);
            background: rgba(196, 167, 125, 0.1);
        }

        .cursor-dot {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .trail {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.3;
            animation: trailFade 0.8s ease-out forwards;
        }

        @keyframes trailFade {
            0% { transform: scale(1.5); opacity: 0.3; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 极简粒子 */
        .click-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9997;
            animation: particleBurst 0.4s ease-out forwards;
        }

        @keyframes particleBurst {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* 隐藏星空 */
        .stars { display: none; }

        /* 微妙粒子画布 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        /* ========================================
           ANIMATIONS - 简洁动效
           ======================================== */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.97); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-10px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes subtlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 文字渐入动画 */
        @keyframes textReveal {
            0% {
                clip-path: inset(0 100% 0 0);
                opacity: 0;
            }
            100% {
                clip-path: inset(0 0 0 0);
                opacity: 1;
            }
        }

        /* 加载动画 */
        @keyframes loadingDots {
            0%, 20% { opacity: 0.3; }
            40%, 100% { opacity: 1; }
        }

        /* 边框渐变动画 */
        @keyframes borderGlow {
            0%, 100% { border-color: var(--border); }
            50% { border-color: rgba(139, 154, 155, 0.3); }
        }

        /* 脉冲环 */
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* ========================================
           NAVIGATION - 极简导航
           ======================================== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: transparent;
            transition: all var(--duration-base) var(--ease);
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--duration-base) var(--ease);
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 154, 155, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .logo:hover::before {
            left: 100%;
        }

        .logo:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px rgba(139, 154, 155, 0.15);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: color var(--duration-fast) var(--ease);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width var(--duration-fast) var(--ease);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:focus-visible,
        button:focus-visible,
        .logo:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        .mobile-menu-btn { display: none; }

        /* ========================================
           HERO SECTION - 简洁首页
           ======================================== */
        .hero, .articles-section, .article-detail {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .hero.active { display: flex; padding-bottom: 6rem; min-height: 100vh; }

        /* Hero entrance animations */
        .hero.active .avatar-container { animation: fadeInScale 0.8s var(--ease) 0.1s backwards; }
        .hero.active .title { animation: fadeInUp 0.8s var(--ease) 0.2s backwards; }
        .hero.active .subtitle { animation: fadeInUp 0.8s var(--ease) 0.3s backwards; }
        .hero.active .tagline { animation: fadeInUp 0.8s var(--ease) 0.4s backwards; }
        .hero.active .typewriter { animation: fadeInUp 0.8s var(--ease) 0.5s backwards; }
        .hero.active .hero-cta-container { animation: fadeInUp 0.8s var(--ease) 0.6s backwards; }
        .hero.active .social-links { animation: fadeInUp 0.8s var(--ease) 0.7s backwards; }

        .articles-section.active, .article-detail.active { display: flex; }

        .articles-section { padding: 8rem 2rem 4rem; justify-content: flex-start; min-height: 100vh; }
        .articles-section.active, .article-detail.active { animation: fadeInUp 0.4s var(--ease); }
        .page-transition { animation: fadeInUp 0.4s var(--ease); }

        .section-title {
            animation: slideInLeft 0.5s var(--ease);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .detail-title { animation: fadeInUp 0.4s var(--ease); }
        .detail-content-wrapper { animation: fadeInScale 0.4s var(--ease) 0.1s backwards; }
        .article-detail { padding: 8rem 2rem 4rem; justify-content: flex-start; }

        /* ========================================
           AVATAR - 精致头像
           ======================================== */
        .avatar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--bg-soft), var(--bg-deep));
            padding: 3px;
            position: relative;
            box-shadow:
                0 0 0 1px var(--border),
                0 8px 32px rgba(0,0,0,0.4),
                0 0 60px rgba(139, 154, 155, 0.1);
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--accent), var(--accent-warm), transparent);
            z-index: -1;
            animation: rotate 8s linear infinite;
            opacity: 0.5;
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .avatar.loaded {
            opacity: 1;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 50%, var(--accent-cool) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            line-height: 1;
            position: relative;
            animation: shimmer 3s ease-in-out infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            opacity: 0.9;
        }

        .tagline {
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            margin-bottom: 2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.7;
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--border);
            background: rgba(139, 154, 155, 0.05);
        }

        .typewriter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-warm);
            margin-bottom: 1.5rem;
            min-height: 1.4rem;
            letter-spacing: 0.03em;
            padding: 0.8rem 1.5rem;
            background: rgba(196, 167, 125, 0.08);
            border: 1px solid rgba(196, 167, 125, 0.2);
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent-warm);
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* ========================================
           HERO CTA BUTTON - 高级主按钮
           ======================================== */
        .hero-cta-container {
            margin-top: 2.5rem;
            animation: fadeInUp 0.8s var(--ease) 0.6s backwards;
            position: relative;
        }

        .hero-cta-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(139, 154, 155, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .hero-cta-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            padding: 18px 40px;
            background: linear-gradient(135deg, rgba(139, 154, 155, 0.12) 0%, rgba(196, 167, 125, 0.08) 100%);
            border: 1px solid rgba(139, 154, 155, 0.25);
            border-radius: 2px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 154, 155, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .hero-cta-btn:hover::before {
            left: 100%;
        }

        .hero-cta-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 2px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139, 154, 155, 0.4), rgba(196, 167, 125, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .hero-cta-btn:hover::after {
            opacity: 1;
        }

        .hero-cta-btn:hover {
            background: linear-gradient(135deg, rgba(139, 154, 155, 0.2) 0%, rgba(196, 167, 125, 0.15) 100%);
            box-shadow:
                0 0 40px rgba(139, 154, 155, 0.15),
                0 0 80px rgba(139, 154, 155, 0.08),
                0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(-3px);
            border-color: rgba(139, 154, 155, 0.4);
        }

        .hero-cta-btn:active {
            transform: translateY(-1px);
            box-shadow:
                0 0 30px rgba(139, 154, 155, 0.12),
                0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .cta-text {
            position: relative;
            z-index: 1;
        }

        .cta-icon {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-cta-btn:hover .cta-icon {
            transform: translateX(6px);
        }

        .cta-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            animation: ctaShimmer 4s ease-in-out infinite;
        }

        @keyframes ctaShimmer {
            0%, 100% { left: -100%; }
            50% { left: 200%; }
        }

        /* ========================================
           SOCIAL LINKS - 简洁社交图标
           ======================================== */
        .social-links { display: flex; gap: 1rem; margin-top: 3rem; }

        .social-link {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--duration-base) var(--ease);
        }

        .social-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(139, 154, 155, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 154, 155, 0.2);
        }

        .social-link:active { transform: translateY(0) scale(0.95); }

        /* 隐藏光效球 */
        .glow-orb { display: none; }

        /* ========================================
           SEARCH - 简洁搜索
           ======================================== */
        .search-box {
            max-width: 400px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .search-box::before {
            content: '';
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border: 1.5px solid var(--text-muted);
            border-radius: 50%;
            pointer-events: none;
            transition: border-color var(--duration-fast) var(--ease);
            z-index: 1;
        }

        .search-box::after {
            content: '';
            position: absolute;
            left: 18px;
            top: calc(50% + 5px);
            width: 1.5px;
            height: 8px;
            background: var(--text-muted);
            transform: rotate(45deg);
            pointer-events: none;
            transition: background var(--duration-fast) var(--ease);
            z-index: 1;
        }

        .search-box:has(.search-input:focus)::before {
            border-color: var(--accent);
        }

        .search-box:has(.search-input:focus)::after {
            background: var(--accent);
        }

        .search-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            padding-left: 2.8rem;

            border: 1px solid var(--border);

            transition: all var(--duration-fast) var(--ease);

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 154, 155, 0.15), 0 0 20px rgba(139, 154, 155, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .search-icon { display: none; }

        .search-results-count {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-size: 0.8rem;

        /* ========================================
           CATEGORY FILTER - 简洁分类
           ======================================== */

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;

        .category-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);

            transition: all var(--duration-fast) var(--ease);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .category-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .category-btn.active {
            border-color: var(--accent-warm);
            color: var(--accent-warm);
            background: rgba(196, 167, 125, 0.1);
        }

        .article-tag {
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.05em;

        /* ========================================
           ARTICLE CARDS - 精致卡片
           ======================================== */

            max-width: 700px;
            margin: 0 auto 1rem;
            padding: 1.8rem 2rem;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--duration-base) var(--ease);
            text-align: left;
            animation: slideInLeft 0.4s var(--ease) backwards;
            position: relative;
            overflow: hidden;
        }

        .article-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity var(--duration-fast) var(--ease);
        }

        .article-card:hover::before {
            opacity: 1;
        }

        .article-card:nth-child(1) { animation-delay: 0.03s; }
        .article-card:nth-child(2) { animation-delay: 0.06s; }
        .article-card:nth-child(3) { animation-delay: 0.09s; }
        .article-card:nth-child(4) { animation-delay: 0.12s; }
        .article-card:nth-child(5) { animation-delay: 0.15s; }

        .article-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px) perspective(1000px) rotateX(1deg) rotateY(-1deg);

            box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(139, 154, 155, 0.15);
        }

        .article-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.6s ease;
        }

        .article-card:hover::after {
            left: 100%;
        }

        .article-meta {
            display: flex;
            gap: 1.2rem;
            margin-bottom: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.05em;

        .article-title {

            font-weight: 600;
            margin-bottom: 0.6rem;

            letter-spacing: 0.01em;

        /* Skeleton loading */
        .skeleton {
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: skeletonShimmer 1.5s infinite;

        @keyframes skeletonShimmer {

            100% { transform: translateX(100%); }

        .skeleton-tag {

            position: fixed;
            top: 0;
            left: 0;

    </style>

    <script>
        async function loadData() {
            try {
                // 使用绝对URL
                const response = await fetch('https://7418520lyz.github.io/data.json');
                if (response.ok) {
                    blogData = await response.json();
                    console.log('Data loaded!');
                } else {
                    console.log('Response not ok');
                }
            } catch (e) {
                console.log('Error:', e);
            }
        }

        // 鼠标跟随
        const cursor = document.querySelector('.cursor'), cursorDot = document.querySelector('.cursor-dot');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 1000);
        });
        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.1; cursorY += (mouseY - cursorY) * 0.1;
            cursor.style.left = cursorX + 'px'; cursor.style.top = cursorY + 'px';
            cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px';

            // 检测hover
            const hoverElements = document.querySelectorAll('a, button, .article-card, .logo, input');
            let isHover = false;
            hoverElements.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
                    isHover = true;
                }
            });
            cursor.classList.toggle('hover', isHover);

            requestAnimationFrame(animateCursor);
        } animateCursor();
        
        // 点击粒子效果
        document.addEventListener('click', (e) => {
            const colors = ['#9a8b7d', '#c4a77d', '#8b9a9b', '#a8a8a8'];
            const particleCount = 8; // 小型粒子数量，不夸张
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'click-particle';
                const angle = (i / particleCount) * 360;
                const distance = 40 + Math.random() * 30; // 40-70px的距离
                const tx = Math.cos(angle * Math.PI / 180) * distance;
                const ty = Math.sin(angle * Math.PI / 180) * distance;
                particle.style.cssText = `
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    width: ${4 + Math.random() * 4}px;
                    height: ${4 + Math.random() * 4}px;
                `;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        });

        let currentCategory = '全部';
        let currentSort = 'new';
        let currentPage = 1;
        const ARTICLES_PER_PAGE = 5;

        function setSort(sort) {
            currentSort = sort;
            currentPage = 1; // 重置到第一页
            document.getElementById('sort-new').classList.toggle('active', sort === 'new');
            document.getElementById('sort-old').classList.toggle('active', sort === 'old');
            renderArticleList();
        }

        function showHome() {
            const overlay = document.getElementById('page-overlay');
            const home = document.getElementById('home');
            const articles = document.getElementById('articles');
            const detail = document.getElementById('article-detail');

            overlay.classList.add('active');
            setTimeout(() => {
                home.classList.add('active');
                home.classList.add('page-transition');
                articles.classList.remove('active');
                detail.classList.remove('active');

                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 100);
            }, 200);
        }

        async function showArticles() {
            const overlay = document.getElementById('page-overlay');
            const home = document.getElementById('home');
            const articles = document.getElementById('articles');
            const detail = document.getElementById('article-detail');

            overlay.classList.add('active');
            setTimeout(() => {
                home.classList.remove('active');
                articles.classList.add('active');
                articles.classList.add('page-transition');
                detail.classList.remove('active');

                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(async () => {
                    overlay.classList.remove('active');
                    await loadData();
                    renderArticleList();
                }, 100);
            }, 200);
        }

        function showAbout() { alert('我是原子，大一学生，正在学习网络安全！'); }

        function renderArticleList() {
            const list = document.getElementById('article-list');
            const filter = document.getElementById('category-filter');
            filter.innerHTML = ['全部', ...blogData.categories].map(c => 
                `<button class="category-btn ${c === currentCategory ? 'active' : ''}" onclick="filterByCategory('${c}')">${c}</button>`
            ).join('');

            let filtered = currentCategory === '全部' ? [...blogData.articles] : blogData.articles.filter(a => a.category === currentCategory);

            // 搜索过滤
            if (searchQuery) {
                filtered = filtered.filter(a =>
                    a.title.toLowerCase().includes(searchQuery) ||
                    (a.content && a.content.toLowerCase().includes(searchQuery)) ||
                    (a.excerpt && a.excerpt.toLowerCase().includes(searchQuery))
                );
            }

            // 显示搜索结果数量
            const countEl = document.getElementById('searchResultsCount');
            if (searchQuery) {
                countEl.textContent = `找到 ${filtered.length} 篇相关文章`;
            } else {
                countEl.textContent = '';
            }

            // 排序
            filtered.sort((a, b) => {
                // 支持 "2026-04-11" 和 "2026-04-11 00:00:00" 两种格式
                const parseDate = (str) => {
                    if (!str) return new Date(0);
                    const parts = str.replace(' ', 'T').split(':');
                    if (parts.length >= 2) {
                        // 有时分秒的情况，补全秒
                        return new Date(parts[0] + ':' + parts[1] + ':00');
                    }
                    return new Date(str);
                };
                const dateA = parseDate(a.date);
                const dateB = parseDate(b.date);
                if (isNaN(dateA.getTime()) || isNaN(dateB.getTime())) return 0;
                return currentSort === 'new' ? dateB - dateA : dateA - dateB;
            });
            
            // 分页计算
            const totalPages = Math.ceil(filtered.length / ARTICLES_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            
            const startIndex = (currentPage - 1) * ARTICLES_PER_PAGE;
            const paginatedArticles = filtered.slice(startIndex, startIndex + ARTICLES_PER_PAGE);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="article-card" style="text-align:center;color:rgba(255,255,255,0.5);">暂无文章，快去添加吧！</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            list.innerHTML = paginatedArticles.map(article => `
                <div class="article-card" onclick="showArticle(${article.id})">
                    <div class="article-meta"><span class="article-tag">${article.category}</span></div>
                    <h3 class="article-title">${article.title}</h3>
                    <p class="article-date">${article.date}</p>
                    <p class="article-excerpt">${article.excerpt}</p>
                </div>
            `).join('');
            
            // 渲染分页
            renderPagination(totalPages);
        }
        
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            let html = '';
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const filter = document.getElementById('category-filter');
            const filtered = currentCategory === '全部' ? [...blogData.articles] : blogData.articles.filter(a => a.category === currentCategory);
            const totalPages = Math.ceil(filtered.length / ARTICLES_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderArticleList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterByCategory(cat) { currentCategory = cat; currentPage = 1; renderArticleList(); }

        // 打字机效果
        const typewriterTexts = [
            '你好，我是原子',
            '一个正在学习网络空间安全的大一学生',
            '热爱技术，喜欢探索',
            'Welcome to my blog!'
        ];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typewriterTimer;

        function typewriterEffect() {
            const element = document.getElementById('typewriter');
            if (!element) return;
            // 移动端隐藏打字机效果
            if (window.innerWidth < 768) {
                element.textContent = '';
                return;
            }
            const currentText = typewriterTexts[textIndex];

            if (isDeleting) {
                element.innerHTML = currentText.substring(0, charIndex - 1) + '<span class="typewriter-cursor"></span>';
                charIndex--;
            } else {
                element.innerHTML = currentText.substring(0, charIndex + 1) + '<span class="typewriter-cursor"></span>';
                charIndex++;
            }

            let speed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentText.length) {
                speed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % typewriterTexts.length;
                speed = 500;
            }

            typewriterTimer = setTimeout(typewriterEffect, speed);
        }

        // 搜索功能
        let searchQuery = '';

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            currentPage = 1;
            renderArticleList();
        }

        function showArticle(id) {
            const article = blogData.articles.find(a => a.id === id);
            if (!article) return;

            const overlay = document.getElementById('page-overlay');
            const detail = document.getElementById('article-detail');

            overlay.classList.add('active');
            setTimeout(() => {
                document.getElementById('home').classList.remove('active');
                document.getElementById('articles').classList.remove('active');
                detail.classList.add('active');
                detail.classList.add('page-transition');

                document.getElementById('detail-title').textContent = article.title;
                document.getElementById('detail-category').textContent = article.category;
                document.getElementById('detail-date').textContent = article.date;
                document.getElementById('detail-content').textContent = article.content;

                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 100);
            }, 200);
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(star);
            }
        }

        // 动态粒子背景
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouseX = 0, mouseY = 0;
            const isMobile = window.innerWidth < 768;
            const particleCount = isMobile ? 30 : 80;
            const connectionDistance = isMobile ? 100 : 150;
            const mouseRadius = isMobile ? 100 : 200;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.8;
                    this.radius = Math.random() * 2 + 1;
                    this.baseRadius = this.radius;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    // 鼠标交互
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouseRadius) {
                        const force = (mouseRadius - dist) / mouseRadius;
                        this.x -= dx * force * 0.02;
                        this.y -= dy * force * 0.02;
                    }

                    // 边界反弹
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#8b9a9b';
                    ctx.globalAlpha = 0.8;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function connectParticles() {
                const lineColor = 'rgba(139, 154, 155, 0.4)';

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = lineColor;
                            ctx.globalAlpha = 1 - (dist / connectionDistance);
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                            ctx.globalAlpha = 1;
                        }
                    }

                    // 连接到鼠标
                    const dx = particles[i].x - mouseX;
                    const dy = particles[i].y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouseRadius) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouseX, mouseY);
                        ctx.strokeStyle = lineColor;
                        ctx.globalAlpha = 1 - (dist / mouseRadius);
                        ctx.lineWidth = 0.3;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                connectParticles();
                requestAnimationFrame(animate);
            }

            init();
            animate();
        }

        loadData().then(() => { createStars(); typewriterEffect(); initParticles(); });

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 阅读进度
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }

            // 阅读进度条
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = (scrollTop / docHeight) * 100;
            const progressBar = document.getElementById('reading-progress');
            if (progressBar) {
                progressBar.style.width = progress + '%';
            }
        }, { passive: true });
    </script>
</body>
