    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #ff00ff;
            --accent: #00d4ff;
            --dark: #0a0a0f;
            --glow-opacity: 0.3;

            --card-border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(10, 10, 15, 0.8);
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-dim: rgba(255, 255, 255, 0.4);
        }

        /* Theme: Cyberpunk (Default) */
        [data-theme="cyberpunk"] {
            --primary: #00ff88;
            --secondary: #ff00ff;
            --accent: #00d4ff;
            --dark: #0a0a0f;
            --glow-opacity: 0.3;
        }

        /* Theme: Ocean */
        [data-theme="ocean"] {
            --primary: #4a9ebb;
            --secondary: #2d6a7a;
            --accent: #a8c5d4;
            --dark: #0c1821;
            --glow-opacity: 0.2;
        }

        /* Theme: Sunset */
        [data-theme="sunset"] {
            --primary: #ff6b35;
            --secondary: #f72585;
            --accent: #ffd166;
            --dark: #1a0a2e;
            --glow-opacity: 0.3;
        }

        /* Theme: Forest */
        [data-theme="forest"] {
            --primary: #2d6a4f;
            --secondary: #40916c;
            --accent: #95d5b2;
            --dark: #081c15;
            --glow-opacity: 0.2;
        }

        /* Theme: Lavender */
        [data-theme="lavender"] {
            --primary: #9d4edd;
            --secondary: #c77dff;
            --accent: #e0aaff;
            --dark: #10002b;
            --glow-opacity: 0.3;
        }

        /* Theme: Cherry */
        [data-theme="cherry"] {
            --primary: #ff4d6d;
            --secondary: #c9184a;
            --accent: #ffb3c1;
            --dark: #1f000b;

        }

        /* Theme: Matrix */
        [data-theme="matrix"] {
            --primary: #00ff00;
            --secondary: #008f11;
            --accent: #33ff33;
            --dark: #000000;
            --glow-opacity: 0.4;

        /* Theme: Twilight */
        [data-theme="twilight"] {
            --primary: #7c6aef;
            --secondary: #a855c7;
            --accent: #d4a5d9;
            --dark: #1a1425;
            --glow-opacity: 0.25;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--dark); color: white; overflow-x: hidden; cursor: none; transition: background 0.5s ease, color 0.5s ease; }
        html { scroll-behavior: smooth; }
        .cursor { position: fixed; width: 20px; height: 20px; border: 2px solid var(--primary); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.1s; mix-blend-mode: difference; }
        .cursor-dot { position: fixed; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; pointer-events: none; z-index: 9999; }
        .trail { position: fixed; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; pointer-events: none; z-index: 9998; opacity: 0.8; animation: trailFade 1s ease-out forwards; }
        @keyframes trailFade { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
        /* 点击粒子效果 */
        .click-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9997;
            animation: particleBurst 0.6s ease-out forwards;
        }
        @keyframes particleBurst {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes floatIn { 0% { opacity: 0; transform: translateY(30px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-50px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(50px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes rotateIn { 0% { opacity: 0; transform: rotate(-10deg) scale(0.9); } 100% { opacity: 1; transform: rotate(0) scale(1); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes ripple { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        .hero.active .avatar-container { animation: fadeInScale 0.8s ease-out 0.2s forwards; opacity: 0; }
        .hero.active .title { animation: fadeInUp 0.8s ease-out 0.4s forwards; opacity: 0; }
        .hero.active .subtitle { animation: fadeInUp 0.8s ease-out 0.6s forwards; opacity: 0; }
        .hero.active .tagline { animation: fadeInUp 0.8s ease-out 0.8s forwards; opacity: 0; }
        .hero.active .typewriter { animation: fadeInUp 0.8s ease-out 0.9s forwards; opacity: 0; }
        .hero.active .scroll-indicator { animation: fadeInUp 0.8s ease-out 1s forwards; opacity: 0; }
        .hero.active .social-links { animation: floatIn 0.8s ease-out 1.1s forwards; opacity: 0; }
        .hero.active .logo { animation: pulse 2s ease-in-out infinite; }
        
        nav { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); transition: background 0.5s ease; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; transition: all 0.3s; }
        .logo:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--primary)); }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 0.9rem; transition: all 0.3s; cursor: pointer; position: relative; padding: 0.3rem 0; }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--primary); transition: width 0.3s ease; }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a:hover::after { width: 100%; }
        .mobile-menu-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; }
        .theme-btn {
            padding: 0.6rem 1rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 2rem;
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .theme-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }
        .theme-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0,255,136,0.3), 0 0 40px rgba(0,255,136,0.1);
            transform: translateY(-2px);
        }
        .theme-dropdown { position: relative; display: inline-block; }
        .theme-options {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 0.8rem;
            background: linear-gradient(180deg, rgba(20,20,30,0.98), rgba(10,10,20,0.98));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 1rem;
            min-width: 180px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,255,136,0.1);
            backdrop-filter: blur(20px);
            z-index: 200;
        }
        .theme-options.show {
            display: block;
            animation: themeMenuIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes themeMenuIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .theme-option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }
        .theme-option::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--opt-primary), var(--opt-secondary));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 0.8rem;
        }
        .theme-option:hover::before { opacity: 0.15; }
        .theme-option:hover {
            transform: translateX(5px);
            color: white;
        }
        .theme-option.active {
            background: linear-gradient(135deg, var(--opt-primary), var(--opt-secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .theme-option.active::before { opacity: 0; }
        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--opt-primary), var(--opt-secondary));
            border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
            transition: all 0.3s;
            box-shadow: 0 0 10px var(--opt-primary);
        }
        .theme-option:hover .theme-dot { transform: scale(1.2); }
        .theme-option.active .theme-dot {
            border-color: white;
            box-shadow: 0 0 15px var(--opt-primary);
        }
        .theme-label { position: relative; z-index: 1; font-weight: 500; }
        .theme-preview {
            position: absolute;
            right: 1rem;
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .theme-option:hover .theme-preview { opacity: 0.6; }
        .theme-option.active .theme-preview { opacity: 1; }
        .theme-preview-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .hero, .articles-section, .article-detail { display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; position: relative; z-index: 1; min-height: 100vh; }
        .hero.active { display: flex; padding-bottom: 8rem; min-height: 120vh; }
        .articles-section.active, .article-detail.active { display: flex; }
        .articles-section { padding: 8rem 2rem 4rem; justify-content: flex-start; min-height: 100vh; }
        .articles-section.active, .article-detail.active { animation: fadeInUp 0.6s ease-out; }
        .page-transition { animation: pageTransition 0.5s ease-out; }
        @keyframes pageTransition {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .section-title { animation: slideInLeft 0.6s ease-out; }
        .detail-title { animation: fadeInUp 0.6s ease-out; }
        .detail-content-wrapper { animation: fadeInScale 0.6s ease-out 0.2s backwards; }
        .article-detail { padding: 8rem 2rem 4rem; justify-content: flex-start; }
        
        .avatar-container { width: 180px; height: 180px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)); margin-bottom: 2rem; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .title { font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900; margin-bottom: 1rem; background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.5)); }
        .subtitle { font-size: 1.5rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 2rem; font-weight: 300; }
        .tagline { font-size: 1rem; color: var(--primary); margin-bottom: 3rem; letter-spacing: 0.3em; }
        .typewriter { font-size: 1rem; color: var(--primary); margin-bottom: 1rem; min-height: 1.5rem; letter-spacing: 0.1em; }
        .typewriter-cursor { display: inline-block; width: 2px; height: 1.2em; background: var(--primary); margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--primary);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        @media (max-width: 768px) {
            .scroll-indicator { font-size: 0.8rem; bottom: 1.5rem; }
        }
        
        .social-links { display: flex; gap: 1.5rem; margin-top: 3rem; }
        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .social-link::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s;
        }
        .social-link:hover {
            background: var(--primary);
            color: var(--dark);
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.5);
        }
        .social-link:hover::after { opacity: 1; }
        .social-link:active { transform: scale(1.05); }
        
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: var(--glow-opacity); pointer-events: none; transition: opacity 0.5s ease; }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: 10%; left: -10%; animation: float 8s infinite ease-in-out; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: 20%; right: -5%; animation: float 10s infinite ease-in-out reverse; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, 30px); } }
        
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-bottom: 1.5rem; text-align: center; color: var(--primary); transition: color 0.5s ease; }
        
        .category-filter { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
        .category-btn { padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 0.5rem; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .category-btn:hover, .category-btn.active { background: var(--primary); color: var(--dark); border-color: var(--primary); transform: scale(1.05); box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .search-box { max-width: 800px; margin: 0 auto 1.5rem; position: relative; }
        .search-input {
            width: 100%;
            padding: 0.8rem 1rem;
            padding-left: 2.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 0.8rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); pointer-events: none; }
        .search-results-count { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 1rem; font-size: 0.9rem; }
        .article-tag { padding: 0.2rem 0.6rem; background: rgba(0,255,136,0.2); border: 1px solid var(--primary); border-radius: 0.3rem; color: var(--primary); font-size: 0.75rem; transition: all 0.3s; }
        
        .article-card {
            max-width: 800px;
            margin: 0 auto 1.5rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInLeft 0.6s ease-out backwards;
        }
        .article-card:nth-child(1) { animation-delay: 0.1s; }
        .article-card:nth-child(2) { animation-delay: 0.2s; }
        .article-card:nth-child(3) { animation-delay: 0.3s; }
        .article-card:nth-child(4) { animation-delay: 0.4s; }
        .article-card:nth-child(5) { animation-delay: 0.5s; }
        .article-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.3), 0 0 20px rgba(0, 255, 136, 0.1);
        }
        .article-card:active { transform: translateY(-4px) scale(0.98); }
        .article-meta { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
        .article-tag { padding: 0.2rem 0.6rem; background: rgba(0,255,136,0.2); border: 1px solid var(--primary); border-radius: 0.3rem; color: var(--primary); font-size: 0.75rem; }
        .article-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; color: white; }
        .article-date { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .article-excerpt { color: var(--text-muted); line-height: 1.6; }
        
        .back-btn {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            margin-bottom: 2rem;
            color: var(--primary);
            cursor: pointer;
            border: 1px solid var(--primary);
            border-radius: 0.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .back-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--primary);
            border-radius: 50%;

        .back-btn:active { transform: translateY(0); }
        .detail-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; margin-bottom: 1rem; color: white; }
        .detail-meta { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; }
        .detail-date { color: var(--text-dim); }

        .detail-content-wrapper {
            max-width: 800px;
            width: 100%;

            padding: 2rem;

            text-align: left;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            font-size: 1rem;
        }

        .sort-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.4rem;
            color: rgba(255,255,255,0.7);

        }

        /* 翻页样式 */

        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 0.6rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-btn:hover, .page-btn.active { background: var(--primary); color: var(--dark); border-color: var(--primary); transform: scale(1.1); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-btn:active { transform: scale(0.95); }
        footer { padding: 2rem; text-align: center; color: var(--text-dim); font-size: 0.8rem; position: relative; z-index: 1; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 99;
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
        }
        .back-to-top.visible { opacity: 1; visibility: visible; animation: bounceIn 0.5s ease-out; }
        .back-to-top:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 8px 25px rgba(0,255,136,0.5); }
        .back-to-top:active { transform: translateY(-2px) scale(0.95); }
        .page-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .page-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        @media (max-width: 768px) {
            html { overflow-y: auto; }
            .title { font-size: 2rem; }
            .subtitle { font-size: 1.1rem; }
            .tagline { font-size: 0.8rem; letter-spacing: 0.15em; }
            .typewriter { font-size: 0.85rem; }
            .hero { padding: 1rem; min-height: 100vh; height: auto; }
            .avatar-container { width: 120px; height: 120px; }
            body { cursor: auto; overflow-x: hidden; overflow-y: auto; }
            .cursor, .cursor-dot { display: none; }
            .mobile-menu-btn { display: none; }
            nav { padding: 0.6rem 0.5rem; flex-wrap: wrap; justify-content: center; gap: 0.5rem; position: relative; }
            .logo { font-size: 1rem; }
            .nav-links { gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
            .nav-links li { display: flex; align-items: center; }
            .nav-links a { font-size: 0.75rem; }
            .theme-btn { padding: 0.4rem 0.7rem; font-size: 0.85rem; }
            .theme-dropdown { position: relative; }
            .theme-options { right: auto; left: 50%; transform: translateX(-50%); top: 100%; }
            .search-input { font-size: 16px; padding: 0.7rem 0.8rem; padding-left: 2.5rem; }
            .article-card { padding: 1rem; margin-bottom: 1rem; }
            .scroll-indicator { left: 0; right: 0; text-align: center; transform: none; }

    <script>
        async function loadData() {
            try {
                // 使用绝对URL
                const response = await fetch('https://7418520lyz.github.io/data.json');
                if (response.ok) {
                    blogData = await response.json();
                    console.log('Data loaded!');
                } else {
                    console.log('Response not ok');
                }
            } catch (e) {
                console.log('Error:', e);
            }
        }

        // 主题系统
        const themes = {
            cyberpunk: { icon: '🎨', primary: '#00ff88', secondary: '#ff00ff', accent: '#00d4ff' },
            ocean: { icon: '🌊', primary: '#4a9ebb', secondary: '#2d6a7a', accent: '#a8c5d4' },
            sunset: { icon: '🌅', primary: '#ff6b35', secondary: '#f72585', accent: '#ffd166' },
            forest: { icon: '🌲', primary: '#2d6a4f', secondary: '#40916c', accent: '#95d5b2' },
            lavender: { icon: '💜', primary: '#9d4edd', secondary: '#c77dff', accent: '#e0aaff' },
            cherry: { icon: '🌸', primary: '#ff4d6d', secondary: '#c9184a', accent: '#ffb3c1' },
            matrix: { icon: '💚', primary: '#00ff00', secondary: '#008f11', accent: '#33ff33' },
            twilight: { icon: '🌆', primary: '#7c6aef', secondary: '#a855c7', accent: '#d4a5d9' }
        };

        function toggleThemeMenu() {
            const menu = document.getElementById('theme-options');
            menu.classList.toggle('show');
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('blog-theme', theme);

            // Update theme button with icon and glow
            const btn = document.querySelector('.theme-btn');
            btn.style.setProperty('--glow-primary', themes[theme].primary);
            btn.style.boxShadow = `0 0 20px ${themes[theme].primary}40, 0 0 40px ${themes[theme].primary}20`;

            document.getElementById('current-theme-icon').textContent = themes[theme].icon;
            document.getElementById('theme-options').classList.remove('show');
            updateActiveThemeOption(theme);
        }

        function updateActiveThemeOption(theme) {
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === theme);
            });
        }

        function loadSavedTheme() {
            const saved = localStorage.getItem('blog-theme') || 'cyberpunk';
            setTheme(saved);
        }

        // 点击其他地方关闭主题菜单
        document.addEventListener('click', (e) => {
            const dropdown = document.querySelector('.theme-dropdown');
            if (!dropdown.contains(e.target)) {
                document.getElementById('theme-options').classList.remove('show');
            }
        });
        
        // 鼠标跟随
        const cursor = document.querySelector('.cursor'), cursorDot = document.querySelector('.cursor-dot');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 1000);
        });
        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.1; cursorY += (mouseY - cursorY) * 0.1;
            cursor.style.left = cursorX + 'px'; cursor.style.top = cursorY + 'px';
            cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px';
            requestAnimationFrame(animateCursor);
        } animateCursor();
        
        // 点击粒子效果
        document.addEventListener('click', (e) => {
            const colors = ['#00ff88', '#ff00ff', '#00d4ff', '#ffffff'];
            const particleCount = 8; // 小型粒子数量，不夸张
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'click-particle';
                const angle = (i / particleCount) * 360;
                const distance = 40 + Math.random() * 30; // 40-70px的距离
                const tx = Math.cos(angle * Math.PI / 180) * distance;
                const ty = Math.sin(angle * Math.PI / 180) * distance;
                particle.style.cssText = `
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    width: ${4 + Math.random() * 4}px;
                    height: ${4 + Math.random() * 4}px;
                `;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        });

        let currentCategory = '全部';
        let currentSort = 'new';
        let currentPage = 1;
        const ARTICLES_PER_PAGE = 5;
        let homeScrollHintShown = false;

        function setSort(sort) {
            currentSort = sort;
            currentPage = 1; // 重置到第一页
            document.getElementById('sort-new').classList.toggle('active', sort === 'new');
            document.getElementById('sort-old').classList.toggle('active', sort === 'old');
            renderArticleList();
        }

        function showHome() {
            const overlay = document.getElementById('page-overlay');
            const home = document.getElementById('home');
            const articles = document.getElementById('articles');
            const detail = document.getElementById('article-detail');

            overlay.classList.add('active');
            setTimeout(() => {
                home.classList.add('active');
                home.classList.add('page-transition');
                articles.classList.remove('active');
                detail.classList.remove('active');

                homeScrollHintShown = false;
                scrollIndicatorShown = false;
                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 100);
            }, 200);
        }

        async function showArticles() {
            const overlay = document.getElementById('page-overlay');
            const home = document.getElementById('home');
            const articles = document.getElementById('articles');
            const detail = document.getElementById('article-detail');

            overlay.classList.add('active');
            setTimeout(() => {
                home.classList.remove('active');
                articles.classList.add('active');
                articles.classList.add('page-transition');
                detail.classList.remove('active');

                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(async () => {
                    overlay.classList.remove('active');
                    await loadData();
                    renderArticleList();
                }, 100);
            }, 200);
        }

        function showAbout() { alert('我是原子，大一学生，正在学习网络安全！'); }

        function renderArticleList() {
            const list = document.getElementById('article-list');
            const filter = document.getElementById('category-filter');
            filter.innerHTML = ['全部', ...blogData.categories].map(c => 
                `<button class="category-btn ${c === currentCategory ? 'active' : ''}" onclick="filterByCategory('${c}')">${c}</button>`
            ).join('');

            let filtered = currentCategory === '全部' ? [...blogData.articles] : blogData.articles.filter(a => a.category === currentCategory);

            // 搜索过滤
            if (searchQuery) {
                filtered = filtered.filter(a =>
                    a.title.toLowerCase().includes(searchQuery) ||
                    (a.content && a.content.toLowerCase().includes(searchQuery)) ||
                    (a.excerpt && a.excerpt.toLowerCase().includes(searchQuery))
                );
            }

            // 显示搜索结果数量
            const countEl = document.getElementById('searchResultsCount');
            if (searchQuery) {
                countEl.textContent = `找到 ${filtered.length} 篇相关文章`;
            } else {
                countEl.textContent = '';
            }

            // 排序
            filtered.sort((a, b) => {
                // 支持 "2026-04-11" 和 "2026-04-11 00:00:00" 两种格式
                const parseDate = (str) => {
                    if (!str) return new Date(0);
                    const parts = str.replace(' ', 'T').split(':');
                    if (parts.length >= 2) {
                        // 有时分秒的情况，补全秒
                        return new Date(parts[0] + ':' + parts[1] + ':00');
                    }
                    return new Date(str);
                };
                const dateA = parseDate(a.date);
                const dateB = parseDate(b.date);
                if (isNaN(dateA.getTime()) || isNaN(dateB.getTime())) return 0;
                return currentSort === 'new' ? dateB - dateA : dateA - dateB;
            });
            
            // 分页计算
            const totalPages = Math.ceil(filtered.length / ARTICLES_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            
            const startIndex = (currentPage - 1) * ARTICLES_PER_PAGE;
            const paginatedArticles = filtered.slice(startIndex, startIndex + ARTICLES_PER_PAGE);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="article-card" style="text-align:center;color:rgba(255,255,255,0.5);">暂无文章，快去添加吧！</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            list.innerHTML = paginatedArticles.map(article => `
                <div class="article-card" onclick="showArticle(${article.id})">
                    <div class="article-meta"><span class="article-tag">${article.category}</span></div>
                    <h3 class="article-title">${article.title}</h3>
                    <p class="article-date">${article.date}</p>
                    <p class="article-excerpt">${article.excerpt}</p>
                </div>
            `).join('');
            
            // 渲染分页
            renderPagination(totalPages);
        }
        
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            let html = '';
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const filter = document.getElementById('category-filter');
            const filtered = currentCategory === '全部' ? [...blogData.articles] : blogData.articles.filter(a => a.category === currentCategory);
            const totalPages = Math.ceil(filtered.length / ARTICLES_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderArticleList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterByCategory(cat) { currentCategory = cat; currentPage = 1; renderArticleList(); }

        // 打字机效果
        const typewriterTexts = [
            '你好，我是原子',
            '一个正在学习网络空间安全的大一学生',
            '热爱技术，喜欢探索',
            'Welcome to my blog!'
        ];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typewriterTimer;

        function typewriterEffect() {
            const element = document.getElementById('typewriter');
            if (!element) return;
            // 移动端隐藏打字机效果
            if (window.innerWidth < 768) {
                element.textContent = '';
                return;
            }
            const currentText = typewriterTexts[textIndex];

            if (isDeleting) {
                element.innerHTML = currentText.substring(0, charIndex - 1) + '<span class="typewriter-cursor"></span>';
                charIndex--;
            } else {
                element.innerHTML = currentText.substring(0, charIndex + 1) + '<span class="typewriter-cursor"></span>';
                charIndex++;
            }

            let speed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentText.length) {
                speed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % typewriterTexts.length;
                speed = 500;
            }

            typewriterTimer = setTimeout(typewriterEffect, speed);
        }

        // 搜索功能
        let searchQuery = '';

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            currentPage = 1;
            renderArticleList();
        }

        function showArticle(id) {
            const article = blogData.articles.find(a => a.id === id);
            if (!article) return;

            const overlay = document.getElementById('page-overlay');
            const detail = document.getElementById('article-detail');

            overlay.classList.add('active');
            setTimeout(() => {
                document.getElementById('home').classList.remove('active');
                document.getElementById('articles').classList.remove('active');
                detail.classList.add('active');
                detail.classList.add('page-transition');

                document.getElementById('detail-title').textContent = article.title;
                document.getElementById('detail-category').textContent = article.category;
                document.getElementById('detail-date').textContent = article.date;
                document.getElementById('detail-content').textContent = article.content;

                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 100);
            }, 200);
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(star);
            }
        }

        // 动态粒子背景
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouseX = 0, mouseY = 0;
            const isMobile = window.innerWidth < 768;
            const particleCount = isMobile ? 30 : 80;
            const connectionDistance = isMobile ? 100 : 150;
            const mouseRadius = isMobile ? 100 : 200;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.8;
                    this.radius = Math.random() * 2 + 1;
                    this.baseRadius = this.radius;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    // 鼠标交互
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouseRadius) {
                        const force = (mouseRadius - dist) / mouseRadius;
                        this.x -= dx * force * 0.02;
                        this.y -= dy * force * 0.02;
                    }

                    // 边界反弹
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }

                draw() {
                    const theme = localStorage.getItem('blog-theme') || 'cyberpunk';
                    const colors = {
                        cyberpunk: '#00ff88',
                        ocean: '#4a9ebb',
                        sunset: '#ff6b35',
                        forest: '#2d6a4f',
                        lavender: '#9d4edd',
                        cherry: '#ff4d6d',
                        matrix: '#00ff00',
                        twilight: '#7c6aef'
                    };
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = colors[theme] || colors.cyberpunk;
                    ctx.globalAlpha = 0.8;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function connectParticles() {
                const theme = localStorage.getItem('blog-theme') || 'cyberpunk';
                const colors = {
                    cyberpunk: '#00ff88',
                    ocean: '#4a9ebb',
                    sunset: '#ff6b35',
                    forest: '#2d6a4f',
                    lavender: '#9d4edd',
                    cherry: '#ff4d6d',
                    matrix: '#00ff00',
                    twilight: '#7c6aef'
                };
                const lineColor = colors[theme] || colors.cyberpunk;

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = lineColor;
                            ctx.globalAlpha = 1 - (dist / connectionDistance);
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                            ctx.globalAlpha = 1;
                        }
                    }

                    // 连接到鼠标
                    const dx = particles[i].x - mouseX;
                    const dy = particles[i].y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouseRadius) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouseX, mouseY);
                        ctx.strokeStyle = lineColor;
                        ctx.globalAlpha = 1 - (dist / mouseRadius);
                        ctx.lineWidth = 0.3;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                connectParticles();
                requestAnimationFrame(animate);
            }

            init();
            animate();

            // 主题切换时更新粒子颜色
            window.updateParticleColor = function() {
                // 颜色会在下次绘制时自动更新
            };
        }
        
        loadData().then(() => { createStars(); loadSavedTheme(); typewriterEffect(); initParticles(); });

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        // 首页滚动跳转文章
        let scrollIndicatorShown = false;
        function handleHomeScroll() {
            if (!document.getElementById('home').classList.contains('active')) return;
            const scrollIndicator = document.getElementById('scroll-indicator');
            if (window.scrollY > 50 && !homeScrollHintShown) {
                if (!scrollIndicatorShown) {
                    scrollIndicatorShown = true;
                    if (scrollIndicator) {
                        scrollIndicator.style.opacity = '1';
                        setTimeout(() => { if (scrollIndicator) scrollIndicator.style.opacity = '0'; }, 2000);
                    }
                }
            }
            if (window.scrollY > 200 && !homeScrollHintShown) {
                homeScrollHintShown = true;
                showArticles();
            }
        }
        window.addEventListener('scroll', handleHomeScroll);
    </script>
</body>
